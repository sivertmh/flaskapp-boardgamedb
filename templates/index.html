{% extends "base.html" %}

<!-- Tittel -->
{% block title %}Home{% endblock %}

<!-- Innhold -->
{% block content %}
<h2 class="general-heading">Browse</h2>

<!-- Viser alle brettspill fra db -->
<div class="boardgame-showcase-cont">
    {% if bg_info %}
    {% for i in bg_info %}
    <!-- i[0] = navn, i[1] = år, i[3] = bilde -->
    <div class="boardgame-card-cont">
        <img src="{{ i[3] }}" alt="Box cover image for {{ i[0] }}">
        <p>{{ i[0] }} ({{ i[1] }})</p>
    </div>
    {% endfor %}
    {% else %}
    <p>No boardgames to show :/</p>
    {% endif %}
</div>
{% endblock %}
